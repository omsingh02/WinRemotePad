<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
<title>Telepad</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#0f172a; color:#f8fafc; font-family:'Inter', system-ui, sans-serif; overflow:hidden; touch-action:manipulation; user-select:none; height:100vh; height:100dvh; display:flex; flex-direction:column; }
  
  .tabs { display:flex; height:56px; min-height:56px; background:#1e293b; border-bottom:1px solid #334155; padding: 0 8px; }
  .tab { flex:1; display:flex; align-items:center; justify-content:center; cursor:pointer; color:#94a3b8; font-weight:500; font-size:14px; transition:color 0.15s; border-bottom: 2px solid transparent; }
  .tab.a { color:#38bdf8; border-bottom-color:#38bdf8; }
  
  .p { display:none; flex:1; overflow:hidden; }
  .p.a { display:flex; flex-direction:column; }
  
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:20px; overflow-y:auto; }
  .btn { background:#1e293b; border:1px solid #334155; color:#f8fafc; padding:20px 12px; text-align:center; border-radius:16px; font-weight:500; font-size:14px; display:flex; flex-direction:column; align-items:center; gap:8px; transition:transform 0.1s, background 0.15s; }
  .btn:active { background:#334155; transform:scale(0.96); }
  
  .media-wrapper { padding: 0 20px 20px 20px; display:flex; flex-direction:column; gap:12px; overflow-y:auto; }
  .media-card { background:#1e293b; border:1px solid #334155; padding:16px; border-radius:16px; display:flex; flex-direction:column; gap:12px; }
  .mc-header { display:flex; justify-content:space-between; align-items:center; }
  .mc-title { font-weight:600; font-size:15px; text-overflow:ellipsis; white-space:nowrap; overflow:hidden; }
  .mc-artist { font-size:12px; color:#94a3b8; text-overflow:ellipsis; white-space:nowrap; overflow:hidden; }
  .mc-status { font-size:11px; padding:2px 8px; border-radius:12px; background:#334155; }
  .mc-status.playing { background:#10b981; color:#064e3b; }
  .mc-controls { display:flex; justify-content:center; gap:20px; }
  .mc-btn { background:#0f172a; border:none; color:#f8fafc; width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
  
  #pad-container { flex:1; padding:20px; display:flex; flex-direction:column; }
  #pad { flex:1; background:#0b1120; border:1px solid #1e293b; border-radius:24px; touch-action:none; position:relative; }
  .pad-hint { text-align:center; color:#64748b; font-size:12px; margin-top:16px; }
  
  #status-wrapper { position:fixed; top:64px; right:16px; display:flex; align-items:center; gap:6px; background:#1e293b; padding:6px 12px; border-radius:20px; border:1px solid #334155; z-index:99; font-size:12px; color:#94a3b8; }
  #status { width:8px; height:8px; border-radius:50%; background:#f87171; }
  #status.ok { background:#10b981; }
  
  #kb { padding:20px; overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:16px; }
  .mods { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .mod { background:#1e293b; border:1px solid #334155; padding:16px 8px; text-align:center; border-radius:12px; font-size:13px; font-weight:600; color:#94a3b8; }
  .mod.on { background:#38bdf8; color:#0f172a; border-color:#38bdf8; }
  .mod-clear { grid-column: span 4; background:transparent; border:1px dashed #334155; padding:8px; font-size:11px; text-transform:uppercase; letter-spacing:1px; color:#64748b; border-radius:8px; text-align:center; }

  input { width:100%; padding:16px; background:#1e293b; border:1px solid #334155; color:#f8fafc; font-size:16px; border-radius:12px; }
  input:focus { outline:none; border-color:#38bdf8; }
  .info { color:#64748b; font-size:11px; text-align:center; line-height:1.4; }
</style>
</head><body>

<div id="status-wrapper"><div id="status"></div><span id="st-text">Connecting</span></div>

<div class="tabs">
  <div class="tab" onclick="sw(0)">Media</div>
  <div class="tab a" onclick="sw(1)">Pad</div>
  <div class="tab" onclick="sw(2)">Keys</div>
</div>

<!-- Media Panel -->
<div class="p"><div style="display:flex; flex-direction:column; height:100%;">
  <div class="grid">
    <div class="btn" style="color:#f87171" onclick="c('lock')">Lock PC</div>
    <div class="btn" onclick="c('mute')">Mute</div>
    <div class="btn" onclick="c('voldn')">Vol Dn</div>
    <div class="btn" onclick="c('volup')">Vol Up</div>
  </div>
  <div class="media-wrapper" id="media-list"></div>
</div></div>

<!-- Trackpad Panel -->
<div class="p a"><div id="pad-container">
  <div id="pad"></div>
  <div class="pad-hint">1-finger: move | Tap: L-click | 2-finger: R-click / Scroll</div>
</div></div>

<!-- Keyboard Panel -->
<div class="p"><div id="kb">
  <div class="mods">
    <div class="mod" id="ctrl" onclick="tm('ctrl')">CTRL</div>
    <div class="mod" id="alt" onclick="tm('alt')">ALT</div>
    <div class="mod" id="shift" onclick="tm('shift')">SHIFT</div>
    <div class="mod" id="win" onclick="tm('win')">SUPER</div>
    <div class="mod-clear" onclick="clr()">Clear Modifiers</div>
  </div>
  <div class="mods">
    <div class="btn" onclick="sk(9)">TAB</div><div class="btn" onclick="sk(27)">ESC</div><div class="btn" onclick="sk(13)">ENT</div><div class="btn" onclick="sk(8)">BKSP</div>
  </div>
  <div class="mods">
    <div class="btn" onclick="sk(37)">←</div><div class="btn" onclick="sk(38)">↑</div><div class="btn" onclick="sk(40)">↓</div><div class="btn" onclick="sk(39)">→</div>
  </div>
  <input id="inp" type="text" placeholder="Type here..." autocomplete="off">
  <div class="info">Modifiers are sticky but auto-clear after 5s of inactivity.</div>
</div></div>

<script>
const st=document.getElementById('status'), stTxt=document.getElementById('st-text'), inp=document.getElementById('inp');
let ws,rt=0,ctrl=0,shift=0,alt=0,win=0,timer=null;

function connect(){
  ws=new WebSocket('ws://'+location.host);
  ws.onopen=()=>{st.classList.add('ok'); stTxt.innerText='Online'; rt=0; clr();};
  ws.onclose=()=>{st.classList.remove('ok'); stTxt.innerText='Offline'; setTimeout(connect,Math.min(1000*2**rt++,30000));};
}
connect();

function rst(){
  if(timer) clearTimeout(timer);
  if(ctrl||shift||alt||win) timer=setTimeout(clr, 5000);
}

function s(m){if(ws?.readyState===1){ws.send(`${m}|${ctrl}|${shift}|${alt}|${win}`); rst();}}
function c(x){s('cmd|'+x)}
function sw(i){
  document.querySelectorAll('.tab').forEach((t,x)=>t.classList.toggle('a',x===i));
  document.querySelectorAll('.p').forEach((p,x)=>p.classList.toggle('a',x===i));
  if(i===2) setTimeout(()=>inp.focus(),100);
  rst();
}

function tm(id){
  if(id==='ctrl')ctrl=1-ctrl; if(id==='alt')alt=1-alt; if(id==='shift')shift=1-shift; if(id==='win')win=1-win;
  document.getElementById(id).classList.toggle('on');
  inp.focus(); rst();
}
function clr(){
  ctrl=shift=alt=win=0;
  document.querySelectorAll('.mod').forEach(x=>x.classList.remove('on'));
  if(ws?.readyState===1) ws.send(`syn|0|0|0|0|0|0|0|0`); // Direct sync clear
  if(timer) clearTimeout(timer); timer=null;
}
function sk(vk){s(`key|${vk}`)}

const pad=document.getElementById('pad');
let lx=0,ly=0,ax=0,ay=0,as=0,mf=0,ts=0,tm_dist=0;

setInterval(()=>{
  if(ax||ay){s(`mv|${ax.toFixed(1)}|${ay.toFixed(1)}`);ax=ay=0}
  if(as){s(`sc|${as.toFixed(1)}`);as=0}
},16);

pad.ontouchstart=e=>{
  e.preventDefault(); mf=Math.max(mf,e.touches.length);
  lx=e.touches[0].clientX; ly=e.touches[0].clientY;
  if(e.touches.length===1&&mf===1){ts=Date.now();tm_dist=0;}
  rst();
};
pad.ontouchmove=e=>{
  e.preventDefault();
  const cx=e.touches[0].clientX,cy=e.touches[0].clientY,dx=cx-lx,dy=cy-ly;
  tm_dist+=Math.abs(dx)+Math.abs(dy);
  if(mf===1){ax+=dx;ay+=dy}else if(mf>=2&&tm_dist>5){as+=dy}
  lx=cx;ly=cy; rst();
};
pad.ontouchend=e=>{
  e.preventDefault(); const d=Date.now()-ts;
  if(!e.touches.length){
    if(mf===1&&tm_dist<15&&d<250) s('cl');
    else if(mf>=2&&tm_dist<15&&d<350) s('rc');
    mf=0;
  }
};

let ign=0;
inp.onkeydown=e=>{
  const k=e.keyCode||e.which;
  if(k===229) return;
  if(ctrl||alt||win||(shift&&e.key?.length>1)){sk(k);e.preventDefault();ign=1;setTimeout(()=>ign=0,50);return}
  if(e.key?.length===1){s('type|'+e.key);e.preventDefault();ign=1;setTimeout(()=>ign=0,50)}
  else{sk(k);e.preventDefault();ign=1;setTimeout(()=>ign=0,50)}
};
inp.oninput=e=>{
  if(!e.data){inp.value='';return}
  if(ctrl||alt||win){ 
    let c = e.data.substring(e.data.length-1);
    sk(c.toUpperCase().charCodeAt(0));
  } else if(!ign){ s('type|'+e.data); }
  inp.value=''; ign=0;
};
async function fetchMedia(){
  if(ws?.readyState!==1)return;
  try {
    const res=await fetch('/media');
    const data=await res.json();
    if(data.length>0){
      document.querySelector('.media-wrapper').innerHTML=data.map(p=>`
        <div class="media-card">
          <div class="mc-header">
            <div style="flex:1;min-width:0"><div class="mc-title">${p.title}</div><div class="mc-artist">${p.artist}</div></div>
            <div class="mc-status ${p.status.toLowerCase()}">${p.status}</div>
          </div>
          <div class="mc-controls">
            <button class="mc-btn" onclick="c('prev|${p.id}')">⏮</button>
            <button class="mc-btn" style="background:#1e293b" onclick="c('play|${p.id}')">${p.status==='Playing'?'Paused':'▶'}</button>
            <button class="mc-btn" onclick="c('next|${p.id}')">⏭</button>
          </div>
        </div>
      `).join('');
    } else document.querySelector('.media-wrapper').innerHTML='';
  }catch(e){}
}
setInterval(fetchMedia,2500);
</script></body></html>
